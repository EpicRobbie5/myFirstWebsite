<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Vliegtuigspel - Mijn website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
    location.href = "login.html";
}
</script>

<div class="topnav">
    <a href="index.html">Home</a>
    <a href="vliegtuigen.html">Vliegtuigen ✈️</a>
    <a href="helikopters.html">Helikopters</a>
    <a href="over-mij.html">Over mij</a>
    <a href="contact.html">Contact</a>
</div>

<h1>✈️ Vliegtuigspel Deluxe</h1>

<p>
    Score: <span id="score">0</span> |
    Highscore: <span id="highscore">0</span>
</p>

<div id="game">
    <div id="plane">✈️</div>
</div>

<script>
const game = document.getElementById("game");
const plane = document.getElementById("plane");
const scoreElement = document.getElementById("score");
const highscoreElement = document.getElementById("highscore");

let planeX = 260;
let score = 0;
let gameRunning = true;
let cloudSpeed = 5;

const highscore = localStorage.getItem("highscore") || 0;
highscoreElement.textContent = highscore;

plane.style.left = planeX + "px";

document.addEventListener("keydown", (event) => {

    if (!gameRunning) return;

    if (event.key === "ArrowLeft") {
        planeX = Math.max(0, planeX - 25);
    }

    if (event.key === "ArrowRight") {
        planeX = Math.min(520, planeX + 25);
    }

    plane.style.left = planeX + "px";
});

function gameOver() {

    gameRunning = false;

    const currentHighscore =
        Number(localStorage.getItem("highscore") || 0);

    if (score > currentHighscore) {
        localStorage.setItem("highscore", score);
    }

    alert("💥 Game Over!\\nScore: " + score);

    location.reload();
}

function createCloud() {

    if (!gameRunning) return;

    const cloud = document.createElement("div");

    cloud.className = "cloud";
    cloud.textContent = "☁️";

    cloud.style.position = "absolute";
    cloud.style.fontSize = "80px";
    cloud.style.left = Math.random() * 500 + "px";
    cloud.style.top = "-80px";

    game.appendChild(cloud);

    let y = -80;

    const interval = setInterval(() => {

        if (!gameRunning) {
            clearInterval(interval);
            return;
        }

        y += cloudSpeed;
        cloud.style.top = y + "px";

        const planeRect = plane.getBoundingClientRect();
        const cloudRect = cloud.getBoundingClientRect();

        if (
            planeRect.left < cloudRect.right &&
            planeRect.right > cloudRect.left &&
            planeRect.top < cloudRect.bottom &&
            planeRect.bottom > cloudRect.top
        ) {
            clearInterval(interval);
            gameOver();
        }

        if (y > 550) {
            cloud.remove();
            clearInterval(interval);
        }

    }, 20);
}

setInterval(() => {

    if (!gameRunning) return;

    score++;
    scoreElement.textContent = score;

    if (score % 15 === 0) {
        cloudSpeed += 0.5;
    }

}, 1000);

function spawnClouds() {

    if (!gameRunning) return;

    createCloud();

    const delay =
        Math.max(300, 1000 - score * 5);

    setTimeout(spawnClouds, delay);
}

spawnClouds();

</script>

</body>
</html>
