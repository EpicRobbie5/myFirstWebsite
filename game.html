<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Mijn Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
    if (
        localStorage.getItem("loggedIn")
        !== "true"
    ) {
        location.href = "login.html";
    }
    </script>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="vliegtuigen.html">Vliegtuigen ✈️</a>
        <a href="helikopters.html">Helikopters</a>
        <a href="over-mij.html">Over mij</a>
        <a href="contact.html">Contact</a>
    </div>
    <h1>✈️ Vliegtuigspel</h1>

    <div id="game">
        <div id="plane">✈️</div>
    </div>

    <p>Score: <span id="score">0</span></p>
    <script>
        const plane = document.getElementById("plane");

        let planeX = 280;

        document.addEventListener("keydown", event => {

            if (event.key === "ArrowLeft") {
                planeX -= 10;
            }

            if (event.key === "ArrowRight") {
                planeX += 10;
            }

            plane.style.left = planeX + "px";
        });
        function createCloud() {

            const cloud = document.createElement("div");

            cloud.textContent = "☁️";

            cloud.style.position = "absolute";
            cloud.style.fontSize = "40px";

            cloud.style.left =
                Math.random() * 550 + "px";

            cloud.style.top = "0px";

            document.getElementById("game")
                .appendChild(cloud);

            let y = 0;

            const interval = setInterval(() => {

                y += 5;
    
                cloud.style.top = y + "px";

                if (y > 500) {
                    cloud.remove();
                    clearInterval(interval);
                }
                const planeRect = plane.getBoundingClientRect();
                const cloudRect = cloud.getBoundingClientRect();

                if (
                    planeRect.left < cloudRect.right &&
                    planeRect.right > cloudRect.left &&
                    planeRect.top < cloudRect.bottom &&
                    planeRect.bottom > cloudRect.top
                ) {
                   alert("💥 Game Over!\nScore: " + score);
                    window.location.href = "game.html";
                }

            }, 20);
        }

        setInterval(createCloud, 1000);
        let score = 0;

        setInterval(() => {

            score++;

            document.getElementById("score")
                .textContent = score;

        }, 1000);
    </script>
