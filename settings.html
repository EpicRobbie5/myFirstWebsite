<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instellingen - Mijn Website</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
    if (
        localStorage.getItem("loggedIn")
        !== "true"
    ) {
        location.href = "login.html";
    }
    </script>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="vliegtuigen.html">Vliegtuigen ✈️</a>
        <a href="helikopters.html">Helikopters</a>
        <a href="over-mij.html">Over mij</a>
        <a href="contact.html">Contact</a>
        <a href="settings.html">Instellingen</a>
        <a href="#" onclick="logout()">Uitloggen</a>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Instellingen</h1>
        </div>

        <div class="setting">
            <label>
                <input type="checkbox" id="darkMode">
                🌙 Donkere modus
            </label>
        </div>

        <div class="setting">
            <label>
                Gebruikersnaam:
                <input type="text" id="username" placeholder="Jouw naam">
            </label>
        </div>

        <div class="setting">
            <button onclick="saveSettings()">
                💾 Opslaan
            </button>
        </div>

        <p id="message"></p>

        <a href="index.html" class="home-button">
            🏠 Terug naar Home
        </a>
    </div>

    <script>
        window.onload = function() {
            document.getElementById("darkMode").checked =
                localStorage.getItem("darkMode") === "true";

            document.getElementById("username").value =
                localStorage.getItem("username") || "";

            applyTheme();
        };

        function saveSettings() {
            localStorage.setItem(
                "darkMode",
                document.getElementById("darkMode").checked
            );

            localStorage.setItem(
                "username",
                document.getElementById("username").value
            );

            applyTheme();

            document.getElementById("message").textContent =
                "✅ Instellingen opgeslagen!";
        }

        function applyTheme() {
            if (document.getElementById("darkMode").checked) {
                document.body.classList.add("dark");
            } else {
                document.body.classList.remove("dark");
            }
        }
    </script>
    </div>
    <footer>
        <p>&copy; 2026 EpicRobbie5. Alle rechten voorbehouden.</p>
        <p>👀 Bezoekers: <span id="visits"></span></p>
        <p>Laatst bijgewerkt: <span id="lastUpdate"></span></p>
    </footer>
    <script>
    function logout() {

        localStorage.removeItem(
            "loggedIn"
        );

        location.href = "login.html";
    }
    </script>
    <script>
        const datum = new Date(document.lastModified);

        document.getElementById("lastUpdate").textContent =
            datum.toLocaleString("nl-BE", {
                day: "numeric",
                month: "long",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
    </script>
    <script>
        let visits = localStorage.getItem("visits") || 0;
        visits++;
        localStorage.setItem("visits", visits);
        document.getElementById("visits").textContent = visits;
    </script>
</body>
</html>
