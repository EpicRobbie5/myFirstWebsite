<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mijn Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h1>✈️ Inloggen</h1>
        <input
            id="username"
            type="username"
            placeholder="Naam"
        >

        <input
            id="password"
            type="password"
            placeholder="Wachtwoord"
        >

        <button onclick="login()">
            Inloggen
        </button>
    </div>

    <script>
        document.getElementById("password").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                login();
            }
        });
        function login() {
            const username =
                document.getElementById("username").value

            const password =
                document.getElementById("password").value;

            if(username === "Robbie" && password === "wright1903") {

                localStorage.setItem(
                    "loggedIn",
                    "true"
                );

                location.href = "index.html";

            }
            else if(username === "Plane" && password === "concorde1969") {

                localStorage.setItem(
                    "loggedIn",
                    "true"
                );

                location.href = "index.html";

            }
            else {

                alert("Verkeerd wachtwoord!");

            }
        }
    </script>
    <footer>
        <p>&copy; 2026 EpicRobbie5. Alle rechten voorbehouden.</p>
        <p>👀 Bezoekers: <span id="visits"></span></p>
        <p>Laatst bijgewerkt: <span id="lastUpdate"></span></p>
    </footer>
    <script>
        function logout() {

            localStorage.removeItem(
            "loggedIn"
            );

            location.href = "login.html";
        }
    </script>
    <script>
        const datum = new Date(document.lastModified);

        document.getElementById("lastUpdate").textContent =
            datum.toLocaleString("nl-BE", {
                day: "numeric",
                month: "long",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
    </script>
    <script>
        let visits = localStorage.getItem("visits") || 0;
        visits++;
        localStorage.setItem("visits", visits);
        document.getElementById("visits").textContent = visits;
    </script>

</body>
</html>
