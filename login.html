<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Login - Mijn Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h1>✈️ Inloggen</h1>

        <input
            id="password"
            type="password"
            placeholder="Wachtwoord"
        >

        <button onclick="login()">
            Inloggen
        </button>
    </div>

    <script>
    function login() {

        const password =
            document.getElementById("password").value;

        if(password === "wright1903") {

            localStorage.setItem(
                "loggedIn",
                "true"
            );

            location.href = "home.html";

        } else {

            alert("Verkeerd wachtwoord!");

        }
    }
    </script>

</body>
</html>
